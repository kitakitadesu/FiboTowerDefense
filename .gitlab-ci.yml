stages:
  - build
  - test

variables:
  CMAKE_BUILD_TYPE: Release

# Linux build (Docker)
build:linux:
  stage: build
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq cmake make g++ git libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libxfixes-dev libgl-dev
  script:
    - mkdir -p build
    - cd build
    - cmake -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} ..
    - make -j$(nproc)
  artifacts:
    paths:
      - build/FiboTowerDefense
  cache:
    paths:
      - build/_deps/

# Build validation test
test:build_validation:
  stage: test
  image: ubuntu:24.04
  dependencies:
    - build:linux
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq file
  script:
    - file build/FiboTowerDefense
    - test -x build/FiboTowerDefense || (echo "Executable not found or not executable" && exit 1)
  only:
    - merge_requests
    - main
