stages:
  - build
  - test
  - deploy

variables:
  CMAKE_BUILD_TYPE: Release

# Windows cross-compile (MinGW-w64 on Linux Docker)
build:windows:
  stage: build
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq cmake make git mingw-w64
  script:
    - mkdir -p build-windows
    - cd build-windows
    - cmake -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} -DCMAKE_TOOLCHAIN_FILE=../cmake/toolchain-mingw.cmake ..
    - make -j$(nproc)
    # Package exe + assets as distributable zip
    - cd ..
    - apt-get install -y -qq zip
    - zip -j FiboTowerDefense-windows.zip build-windows/FiboTowerDefense.exe assets/*
  artifacts:
    paths:
      - FiboTowerDefense-windows.zip
  cache:
    key:
      files:
        - CMakeLists.txt
      prefix: "mingw-deps"
    paths:
      - build-windows/_deps/
  except:
    - feat/web-target

# Build validation test
test:build_validation:
  stage: test
  image: ubuntu:24.04
  dependencies:
    - build:windows
  before_script:
    - apt-get update -qq && apt-get install -y -qq file unzip
  script: |
    unzip -o FiboTowerDefense-windows.zip -d test-exe
    file test-exe/FiboTowerDefense.exe
    file test-exe/FiboTowerDefense.exe | grep -qiE PE32
    if ! test -f test-exe/map_day_0.png; then echo "Missing asset: map_day_0.png"; exit 1; fi
  only:
    - merge_requests
    - main

# Web build + GitLab Pages (deployed on feat/web-target branch)
pages:
  stage: deploy
  image: emscripten/emsdk:4.0.23
  before_script:
    # emsdk images ship cmake 3.22 (Ubuntu 22.04 base); raylib needs ≥3.25
    - pip3 install cmake --upgrade -q
  script:
    - emcmake cmake -DPLATFORM=Web -B build-web -S .
    - cmake --build build-web -- -j$(nproc)
    - mkdir -p public
    - cp build-web/FiboTowerDefense.html public/index.html
    - cp build-web/FiboTowerDefense.js public/
    - cp build-web/FiboTowerDefense.wasm public/
    - cp build-web/FiboTowerDefense.data public/
  cache:
    key:
      files:
        - CMakeLists.txt
      prefix: "emscripten-deps"
    paths:
      - build-web/_deps/
  artifacts:
    paths:
      - public
  only:
    - main
