stages:
  - build
  - test
  - deploy

variables:
  CMAKE_BUILD_TYPE: Release

# Linux build (Docker)
build:linux:
  stage: build
  image: ubuntu:24.04
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq cmake make g++ git libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libxfixes-dev libgl-dev libdw-dev
  script:
    - mkdir -p build
    - cd build
    - cmake -DCMAKE_BUILD_TYPE=${CMAKE_BUILD_TYPE} ..
    - make -j$(nproc)
  artifacts:
    paths:
      - build/FiboTowerDefense
  cache:
    paths:
      - build/_deps/
  except:
    - feat/web-target

# Build validation test
test:build_validation:
  stage: test
  image: ubuntu:24.04
  dependencies:
    - build:linux
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq file
  script:
    - file build/FiboTowerDefense
    - test -x build/FiboTowerDefense || (echo "Executable not found or not executable" && exit 1)
  only:
    - merge_requests
    - main

# Web build + GitLab Pages (deployed on feat/web-target branch)
pages:
  stage: deploy
  image: emscripten/emsdk:4.0.23
  before_script:
    # emsdk images ship cmake 3.22 (Ubuntu 22.04 base); raylib needs ≥3.25
    - pip3 install cmake --upgrade -q
  script:
    - emcmake cmake -DPLATFORM=Web -B build-web -S .
    - cmake --build build-web -- -j$(nproc)
    - mkdir -p public
    - cp build-web/FiboTowerDefense.html public/index.html
    - cp build-web/FiboTowerDefense.js public/
    - cp build-web/FiboTowerDefense.wasm public/
    - cp build-web/FiboTowerDefense.data public/
  artifacts:
    paths:
      - public
  # no only/except → runs on all branches
